<!-- template.html -->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>SVG Icon Test Page</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <!-- Inline sprite -->
        {{SPRITE_CONTENT}}

        <div class="header">
            <h1>SVG Icon Test Page</h1>
            <p>
                Testing {{ICON_COUNT}} icons with <code>currentColor</code> +
                background fill
            </p>
        </div>

        <div class="color-controls">
            <label
                >Background:
                <input type="color" id="bgColorPicker" value="#f0f0f0"
            /></label>
            <label
                >Foreground:
                <input type="color" id="fgColorPicker" value="#374151"
            /></label>
        </div>

        <div class="toggle-controls">
            <button class="toggle-class-button" data-class="toggle-circle">
                Toggle Circle
            </button>
            <button class="toggle-class-button" data-class="class-two">
                Toggle Class Two
            </button>
            <button class="toggle-class-button" data-class="class-three">
                Toggle Class Three
            </button>
        </div>

        <div id="iconContainer" class="icon-grid">{{ICON_GRID}}</div>

        <script src="script.js"></script>
        <style>
            .toggle-controls {
                margin-bottom: 16px;
            }

            .icon-card {
                --circle-display: block; /* Default value */
            }

            .icon-card.toggle-circle {
                --circle-display: none;
            }

            .icon-card.class-one {
                background-color: lightblue;
            }

            .icon-card.class-two {
                border: 2px solid red;
            }

            .icon-card.class-three {
                opacity: 0.5;
            }

            .icon-card svg .eit-icon-circle {
                display: var(--circle-display);
            }
        </style>
    </body>
</html>
